name: 14 - Working with ARtifacts
on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 14-Artifacts/react-app
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
            - name: Install dependencies
              uses: actions/cache@v3
              id: cache
              with:
                path: 13-caching/react-app/node_module
                key: deps-node-nodules-${{ hashfiles('14-Artifacts/react-app/package-lock.json')}}
            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm cli
            - name: Unit Tests
              run: npm run test #
            - name: Build Code
              run: npm run build
            - name: Upload build file
              uses: actions/upload-artifact@v3
              with:
                name: app
                path: 14-Artifacts/react-app/build


    deploy:
         runs-on: ubuntu-latest
         steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v3
              with:
                name: app
                path: build
            - name: Show folder structure
              run: ls -R
              
