name: 11 - Working with Inputs

on: 
    workflow_dispatch:
        inputs:
            dry-run:
                type: boolean
                description: skip deployment and only print build output
                default: false

            target:
                type: environment
                required: true
                description: Which environment the workflow will target
            tag:
                type: choice
                options:
                    - v1
                    - v2
                    - v3
                default: v3
                description : Releaase from which to build and deploy

jobs:
    echo:
        runs-on: ubuntu-latest
        steps:
            - name: Build
              run: echo "Building from tag ${{inputs.tag}}"
    deploy:
        runs-on: ubuntu-latest
        if: ${{input.dry_tun }}
        environment: ${{ input.target}}
        steps:
            - name: Deploy
                run: echo "Deploying to ${{inputs.target}}"

