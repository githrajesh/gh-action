name: 04 - Using Actions

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            #- name: Printing Folders
            #  run: ls
        
            - name:  Setup Node
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
            - name: Install Dependencies
              run: npm ci
              #working-directory: react-app
            - name: Run Unit Tests
              run: npm run test

      #0 Check out the code from repo
        
        #1. Install dep on our react apps
        #2 Eecutea automated tests


